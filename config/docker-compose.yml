services:
  telemt:
    # ---------------------------------------------------------------
    # Образ собирается ЛОКАЛЬНО из telemt.dockerfile, а не тянется готовым
    # сторонним образом. Тег и build-arg берутся
    # из .env (TELEMT_VERSION) — обновление = смена версии + пересборка.
    # ---------------------------------------------------------------
    build:
      context: .
      dockerfile: telemt.dockerfile
      args:
        TELEMT_VERSION: ${TELEMT_VERSION:-3.4.18}
    image: civisrom/mt-telemt:${TELEMT_VERSION:-3.4.18}
    container_name: telemt
    labels:
      org.civisrom.mt-docker: "telemt"
    restart: unless-stopped
    # No pull_policy: образ собирается явно (install-mtproto.sh / systemd через
    # выделенный buildx-builder). `compose up` использует уже собранный образ и
    # не пересобирает его дефолтным builder'ом.

    # Telemt uses RUST_LOG for verbosity (optional)
    environment:
      RUST_LOG: "info"

    # ---------------------------------------------------------------
    # telemt run --data-path /etc/telemt/data /etc/telemt/telemt.toml
    # Конфиг и data-path лежат в смонтированной (writable) директории,
    # поэтому атомарная запись конфига (.tmp + rename) и replay-кэш
    # работают, а остальная ФС остаётся read-only.
    # ---------------------------------------------------------------
    command: ["run", "--data-path", "/etc/telemt/data", "/etc/telemt/telemt.toml"]
    volumes:
      - ./telemt-config:/etc/telemt

    # ---------------------------------------------------------------
    # Host network mode: контейнер использует сетевой стек хоста. Секция
    # "ports" в этом режиме ИГНОРИРУЕТСЯ — telemt биндит порт хоста по
    # значению [server] port в telemt.toml.
    #
    # Чтобы использовать Docker-маппинг портов, закомментируйте
    # network_mode: host и раскомментируйте ports ниже.
    # ---------------------------------------------------------------
    network_mode: host

    # ports:
    #   - "443:443/tcp"
    #   # If you enable metrics_port=9090 in config:
    #   # - "127.0.0.1:9090:9090/tcp"

    # Hardening
    # ---------------------------------------------------------------
    # Сбрасываем все capabilities, кроме NET_BIND_SERVICE — он нужен,
    # чтобы non-root бинарь (uid 65532) мог биндить привилегированные
    # порты (<1024, напр. 443). На сам бинарь повешена file-capability
    # cap_net_bind_service (см. telemt.dockerfile); cap_add держит её
    # в bounding set контейнера.
    #
    # ВАЖНО: no-new-privileges НЕ включаем намеренно — этот флаг
    # отключает применение file-capabilities при execve, из-за чего
    # non-root перестаёт биндить 443. Если 443 не нужен (порт >1024) —
    # можно добавить `security_opt: [no-new-privileges:true]` и убрать
    # cap_add для максимального hardening.
    # ---------------------------------------------------------------
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

    # File descriptor limits (critical for high-connection proxy)
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
