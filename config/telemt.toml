show_link = []

[general]
log_level = "normal"
disable_colors = true
prefer_ipv6 = false
fast_mode = true
use_middle_proxy = false

[general.modes]
classic = false
secure = false
tls = true

[server]
# В host mode это реальный порт на хосте.
# Клиенты (relay-серверы) подключаются на этот порт.
# Если порт 443 занят nginx — используйте другой (например 4443).
port = 443
listen_addr_ipv4 = "0.0.0.0"
#listen_addr_ipv6 = "::"
# metrics_port = 9090
# metrics_whitelist = ["127.0.0.1", "::1"]

[[server.listeners]]
ip = "0.0.0.0"
# announce_ip — IP который telemt объявляет клиентам в proxy-ссылках.
# Укажите ваш публичный IP (или IP relay-сервера, если клиенты идут через relay).
announce_ip = "0.0.0.0"

[censorship]
tls_domain = "example.com"
mask = true
mask_port = 443
fake_cert_len = 2048
tls_emulation = true
tls_new_session_tickets = 0
mask_shape_hardening = false
mask_shape_bucket_floor_bytes = 512
mask_shape_bucket_cap_bytes = 4096
mask_shape_hardening_aggressive_mode = false
mask_shape_above_cap_blur = false
mask_shape_above_cap_blur_max_bytes = 512
mask_timing_normalization_enabled = false
mask_timing_normalization_floor_ms = 180
mask_timing_normalization_ceiling_ms = 320

[access]
replay_check_len = 65536
ignore_time_skew = false

[access.users]

[[upstreams]]
type = "direct"
enabled = true
weight = 10
